site_name: Andy Kemp Consulting Docs
site_url: https://docs.andykemp.com
site_description: Technical documentation for tools and solutions by Andy Kemp Consulting — Microsoft 365 Security, Identity & Migration
site_author: Andy Kemp Consulting

copyright: >
  &copy; 2026 Andy Kemp Consulting Ltd — Company No: SC878818 — Registered in Scotland

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    logo: material/file-document-multiple

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/andrewgkemp/
      name: Andy Kemp on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/andrew-kemp/
      name: Andy Kemp on GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@KempyAG
      name: Andy Kemp on YouTube
    - icon: fontawesome/solid/globe
      link: https://www.andykemp.com
      name: Andy Kemp Consulting
  generator: false

extra_css:
  - assets/css/custom.css

repo_url: https://github.com/andrew-kemp
repo_name: andrew-kemp

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - DNS Migrator:
    - dns-migrator/index.md
    - Quick Start: dns-migrator/quick-start.md
    - Architecture: dns-migrator/architecture.md
    - Deployment:
      - Prerequisites: dns-migrator/prerequisites.md
      - Configuration: dns-migrator/configuration.md
      - Deploy: dns-migrator/deployment.md
    - Usage:
      - Web UI Guide: dns-migrator/web-ui.md
      - PowerShell CLI: dns-migrator/powershell.md
    - API Reference: dns-migrator/api-reference.md
    - Troubleshooting: dns-migrator/troubleshooting.md
  - MFA Onboarding:
    - mfa-onboarding/index.md
    - Quick Start: mfa-onboarding/quick-start.md
    - Architecture: mfa-onboarding/architecture.md
    - Deployment:
      - Prerequisites: mfa-onboarding/prerequisites.md
      - Configuration: mfa-onboarding/configuration.md
      - Step-by-Step Deployment: mfa-onboarding/deployment.md
      - Resume & Update: mfa-onboarding/update.md
    - Features:
      - Upload Portal: mfa-onboarding/upload-portal.md
      - Email Reports: mfa-onboarding/email-reports.md
      - Tracking & Status: mfa-onboarding/tracking.md
    - Troubleshooting: mfa-onboarding/troubleshooting.md
    - What's New: mfa-onboarding/whats-new.md
  - Tenant Audit:
    - tenant-audit/index.md
    - Getting Started: tenant-audit/getting-started.md
    - What We Check: tenant-audit/what-we-check.md
    - Scoring & Ratings: tenant-audit/scoring.md
    - Intelligence & Insights: tenant-audit/intelligence.md
    - Compliance Frameworks: tenant-audit/compliance.md
    - Reports & Exports: tenant-audit/reports.md
    - Licensing Requirements: tenant-audit/licensing.md
    - FAQ: tenant-audit/faq.md
